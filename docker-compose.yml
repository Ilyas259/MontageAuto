services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - "./backend/config/profiles:/app/backend/config/profiles"
      - "pipeline_data:/root/.video-automation/data"
    environment:
      - PIPELINE_DATA_DIR=/root/.video-automation/data
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8502:8502"
    environment:
      - API_URL=http://backend:8001
    depends_on:
      - backend

volumes:
  pipeline_data:
